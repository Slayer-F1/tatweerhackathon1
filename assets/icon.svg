<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Najm Al Qua'a">
  <defs>
    <radialGradient id="sky" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#16204a"/>
      <stop offset="100%" stop-color="#070a18"/>
    </radialGradient>
    <linearGradient id="star" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="100%" stop-color="#f3a847"/>
    </linearGradient>
    <linearGradient id="dune" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2140"/>
      <stop offset="100%" stop-color="#120c22"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#sky)"/>
  <!-- small stars -->
  <g fill="#eaf0ff">
    <circle cx="120" cy="120" r="3.4"/>
    <circle cx="400" cy="96" r="2.6"/>
    <circle cx="360" cy="180" r="3"/>
    <circle cx="92" cy="220" r="2.4"/>
    <circle cx="430" cy="250" r="2.8"/>
    <circle cx="170" cy="80" r="2"/>
  </g>
  <!-- main star (najm) -->
  <g transform="translate(256 210)">
    <path d="M0,-96 L22,-26 L94,-26 L36,16 L58,86 L0,44 L-58,86 L-36,16 L-94,-26 L-22,-26 Z"
          fill="url(#star)" stroke="#fff3d6" stroke-width="3"/>
    <circle r="150" fill="none" stroke="#ffd479" stroke-opacity="0.25" stroke-width="3"/>
  </g>
  <!-- dunes -->
  <path d="M0,372 C120,330 180,400 280,372 C360,350 430,392 512,360 L512,512 L0,512 Z" fill="url(#dune)"/>
  <path d="M0,420 C140,392 230,440 330,420 C420,402 470,432 512,414 L512,512 L0,512 Z" fill="#0c0a18" opacity="0.85"/>
</svg>
